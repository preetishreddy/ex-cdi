<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — LightHouse</title>
  <link rel="stylesheet" href="static/css/auth.css">
</head>
<body>

  <div class="auth-bg"></div>
  <div class="auth-glow"></div>

  <div class="auth-wrapper">
    <div class="auth-card">

      <a href="login.html" class="back-link">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Back to sign in
      </a>

      <div class="auth-brand">
        <div class="auth-brand-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h1>Reset Password</h1>
        <p>Enter your work email and we'll send a reset link</p>
      </div>

      <div class="alert alert-success" id="resetSuccess"></div>
      <div class="alert alert-error" id="resetError"></div>

      <form id="forgotForm" novalidate>
        <div class="form-group">
          <label for="email">Work Email</label>
          <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email" required>
        </div>

        <button type="submit" class="btn btn-primary">Send Reset Link</button>
      </form>

      <div class="auth-footer">
        Remember your password? <a href="login.html">Sign in</a>
      </div>

    </div>
  </div>

  <script src="static/js/auth.js"></script>
</body>
</html>
