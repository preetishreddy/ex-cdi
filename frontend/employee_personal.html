  <div class="sidebar-menu">

  <div class="sidebar-bottom"><div class="user-chip"><div class="avatar-sm" id="userAvatar">—</div><div><div class="user-name" id="sidebarUserName">Loading...</div><div class="user-role">Employee</div></div><a href="login.html" class="logout-btn" onclick="sessionStorage.clear()"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></a></div></div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="main">
  <div class="topbar"><div><div class="page-title">My Profile</div><div class="page-sub" id="topbarSub">Welcome back, reviewing your tasks and skills</div></div></div>
  
  <div class="content">
    <div class="ep-layout">
      <!-- Left: Daily Tasks + Calendar -->
      <div class="ep-main">
        <div class="ep-section ep-tasks-section">
          <div class="ep-section-header">
            <h2>Daily Tasks</h2>
            <div class="ep-date-display" id="currentDate">Today</div>
          </div>
          <div class="ep-tasks-container" id="tasksContainer">
            <div class="ep-task-loading"><div class="spinner-sm"></div></div>
          </div>
        </div>

        <!-- Calendar at bottom of main -->
        <div class="ep-section ep-calendar-section">
          <div class="ep-section-header">
            <h2>Calendar</h2>
          </div>
          <div class="ep-calendar" id="calendar">
            <div class="cal-header">
              <button id="prevMonth" class="cal-nav-btn">←</button>
              <h3 id="monthYear"></h3>
              <button id="nextMonth" class="cal-nav-btn">→</button>
            </div>
            <div class="cal-grid" id="calendarGrid"></div>
          </div>
        </div>
      </div>

      <!-- Right: Skills + Calendar Preview -->
      <div class="ep-sidebar">
        <div class="ep-section ep-skills-section">
          <div class="ep-section-header">
            <h2>Your Skills</h2>
          </div>
          <div class="ep-skills-container" id="skillsContainer">
            <p class="ep-placeholder">Loading your project skills...</p>
          </div>
        </div>

        <div class="ep-section ep-meetings-section">
          <div class="ep-section-header">
            <h2>Today's Schedule</h2>
          </div>
          <div class="ep-meetings-container" id="meetingsContainer">
            <p class="ep-placeholder">No scheduled meetings</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Task Detail Modal -->
<div class="ep-modal" id="taskModal">
  <div class="ep-modal-overlay"></div>
  <div class="ep-modal-content">
    <div class="ep-modal-header">
      <h3 id="modalTaskTitle">Task Details</h3>
      <button class="ep-modal-close" onclick="document.getElementById('taskModal').classList.remove('active')">✕</button>
    </div>
    <div class="ep-modal-body">
      <div class="ep-task-detail">
        <div class="etd-field">
          <label>Task ID</label>
          <div id="modalTaskId" class="etd-value"></div>
        </div>
        <div class="etd-field">
          <label>Status</label>
          <div id="modalTaskStatus" class="etd-value"></div>
        </div>
        <div class="etd-field">
          <label>Priority</label>
          <div id="modalTaskPriority" class="etd-value"></div>
        </div>
        <div class="etd-field">
          <label>Description</label>
          <div id="modalTaskDesc" class="etd-value"></div>
        </div>
        <div class="etd-field">
          <label>Comment</label>
          <textarea id="taskComment" class="etd-textarea" placeholder="Add a comment before completing..."></textarea>
        </div>
      </div>
    </div>
    <div class="ep-modal-footer">
      <button class="btn btn-secondary" onclick="document.getElementById('taskModal').classList.remove('active')">Cancel</button>
      <button class="btn btn-primary" id="completeTaskBtn">Mark as Complete</button>
    </div>
  </div>
</div>

<script src="static/js/employee_personal.js"></script>
</body>
</html>
