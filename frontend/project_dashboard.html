<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EX-CDI — Project Overview</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Source+Sans+3:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="static/css/project_dashboard.css">
<link rel="stylesheet" href="static/css/solution_chat.css">
</head>
<body>
<div class="page-bg"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div><div class="logo-text">EX-<span>CDI</span></div></div>
  <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="sidebar-section">Projects</div>
  <div class="project-rail" id="projectRail">
    <div class="project-rail-loading"><div class="spinner-sm"></div></div>
  </div>
  <div class="project-flyout" id="projectFlyout">
    <div class="flyout-arrow"></div>
    <div class="flyout-header">
      <span class="flyout-title" id="flyoutTitle"></span>
      <span class="flyout-status" id="flyoutStatus"></span>
    </div>
    <div class="flyout-body" id="flyoutBody"></div>
    <a class="flyout-link" id="flyoutLink" href="#">Open Project →</a>
  </div>
  <div class="sidebar-bottom"><div class="user-chip"><div class="avatar-sm" id="userAvatar">—</div><div><div class="user-name" id="sidebarUserName">Loading...</div><div class="user-role">Employee</div></div><a href="login.html" class="logout-btn" onclick="sessionStorage.clear()"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></a></div></div>
</nav>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="main">
  <div class="topbar"><div><div class="page-title">Project Overview</div><div class="page-sub" id="topbarSub">Loading workspace...</div></div><div class="topbar-stats" id="topbarStats"></div></div>
  <div class="content">
    <div class="timeline-wrap" id="timelineWrap"><div class="timeline-label">Project Timeline — ONBOARD</div><div class="timeline" id="timeline"></div></div>
    <div class="content-row">
      <div class="detail-panel" id="detailPanel"></div>
      <div class="team-card" id="teamCard"></div>
    </div>
  </div>
</div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-content">
    <div class="loading-logo"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
    <div class="loading-title">EX-<span>CDI</span></div>
    <div class="loading-bar"><div class="loading-bar-fill" id="loadingBarFill"></div></div>
    <div class="loading-text" id="loadingText">Initializing...</div>
  </div>
</div>
<div class="meeting-popup-overlay" id="meetingPopupOverlay">
  <div class="meeting-popup" id="meetingPopup"></div>
</div>
<script>
// Sidebar toggle logic
const sidebar = document.getElementById('sidebar');
const toggleBtn = document.getElementById('sidebarToggle');
const overlay = document.getElementById('sidebarOverlay');

// Restore state from localStorage
if (localStorage.getItem('sidebarCollapsed') === 'true') {
  sidebar.classList.add('collapsed');
  document.body.classList.add('sidebar-collapsed');
}

toggleBtn.addEventListener('click', () => {
  const isMobile = window.innerWidth <= 900;
  if (isMobile) {
    sidebar.classList.toggle('mobile-open');
    overlay.classList.toggle('visible', sidebar.classList.contains('mobile-open'));
  } else {
    sidebar.classList.toggle('collapsed');
    document.body.classList.toggle('sidebar-collapsed');
    localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
  }
});

overlay.addEventListener('click', () => {
  sidebar.classList.remove('mobile-open');
  overlay.classList.remove('visible');
});
</script>
<script type="module" src="/static/js/project_dashboard.js"></script>
<script src="/static/js/solution_chat.js"></script>
</body>
</html>
