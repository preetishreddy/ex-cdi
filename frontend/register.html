<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — EX-CDI</title>
  <link rel="stylesheet" href="static/css/auth.css">
</head>
<body>

  <div class="auth-bg"></div>
  <div class="auth-glow"></div>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-brand">
        <div class="auth-brand-icon">
          <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        </div>
        <h1>Create Account</h1>
        <p>Register with your workspace email</p>
      </div>

      <div class="alert alert-error" id="registerAlert"></div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="full_name">Full Name</label>
          <input type="text" id="full_name" name="full_name" placeholder="Jane Doe" autocomplete="name" required>
        </div>

        <div class="form-group">
          <label for="email">Work Email</label>
          <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-password-wrap">
            <input type="password" id="password" name="password" placeholder="Create a strong password" autocomplete="new-password" required>
            <button type="button" class="toggle-password" data-target="password" aria-label="Show password">
              <svg class="icon-eye" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="icon-eye-off" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>

          <div class="password-strength">
            <div class="strength-bar"><div class="strength-bar-fill" id="strengthFill"></div></div>
            <span class="strength-label" id="strengthLabel"></span>
          </div>

          <ul class="password-requirements" id="requirements">
            <li data-req="length"><svg class="req-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>8+ characters</li>
            <li data-req="uppercase"><svg class="req-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>Uppercase</li>
            <li data-req="lowercase"><svg class="req-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>Lowercase</li>
            <li data-req="number"><svg class="req-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>Number</li>
          </ul>
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm Password</label>
          <div class="input-password-wrap">
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" autocomplete="new-password" required>
            <button type="button" class="toggle-password" data-target="confirm_password" aria-label="Show password">
              <svg class="icon-eye" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="icon-eye-off" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top:0.5rem">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>

    </div>
  </div>

  <script src="static/js/auth.js"></script>
</body>
</html>
