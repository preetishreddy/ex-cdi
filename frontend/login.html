<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — LightHouse</title>
  <link rel="stylesheet" href="static/css/auth.css">
</head>
<body>
  <div class="auth-bg"></div>
  <div class="auth-glow"></div>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-icon">
          <svg viewBox="0 0 24 24"><path d="M10.5 5a1.5 1.5 0 0 1 3 0"/><path d="M10 5h4v3h-4z"/><path d="M10 8L8 19h8l-2-11z"/><line x1="10" y1="11" x2="14" y2="13"/><line x1="9.3" y1="15" x2="14.7" y2="17"/><path d="M6 19h12v2H6z"/><line x1="14" y1="5.5" x2="20" y2="2.5"/><line x1="14.5" y1="7" x2="21" y2="5"/><path d="M21 1.5v2M20 2.5h2"/></svg>
        </div>
        <h1>Light<span>House</span></h1>
        <p>Sign in with your workspace account</p>
      </div>
      <div class="alert alert-error" id="loginAlert"></div>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Work Email</label>
          <input type="email" id="email" name="email" placeholder="you@company.atlassian.net" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-password-wrap">
            <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
            <button type="button" class="toggle-password" aria-label="Show password" onclick="var i=document.getElementById('password'),a=this.querySelector('.eye-on'),b=this.querySelector('.eye-off');if(i.type==='password'){i.type='text';a.style.display='none';b.style.display='block';}else{i.type='password';a.style.display='block';b.style.display='none';}">
              <svg class="eye-on" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-off" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div class="form-row">
          <label class="checkbox-wrap"><input type="checkbox" name="remember"><span>Remember me</span></label>
          <a href="forgot_password.html" class="auth-link">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>
      <div class="auth-footer">Don't have an account? <a href="register.html">Create one</a></div>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var al = document.getElementById('loginAlert');
      al.style.display = 'none';
      var email = document.getElementById('email').value.trim();
      var pass = document.getElementById('password').value;
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        al.textContent = 'Please enter a valid work email address.';
        al.style.display = 'block'; return;
      }
      if (!pass) {
        al.textContent = 'Please enter your password.';
        al.style.display = 'block'; return;
      }
      sessionStorage.setItem('isLoggedIn', '1');
      sessionStorage.setItem('userEmail', email);
      sessionStorage.setItem('userName', email.split('@')[0].replace(/[._]/g, ' ').replace(/\b\w/g, function(l){ return l.toUpperCase(); }));
      sessionStorage.setItem('jiraDomain', email.split('@')[1] || '');
      sessionStorage.removeItem('dashboardLoaded');   // ensure loading animation plays
      window.location.href = 'project_dashboard.html';
    });
  </script>
</body>
</html>
