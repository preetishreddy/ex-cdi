<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — EX-CDI</title>
  <link rel="stylesheet" href="static/css/auth.css">
</head>
<body>

  <div class="auth-bg"></div>
  <div class="auth-glow"></div>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-brand">
        <div class="auth-brand-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <h1>EX-CDI</h1>
        <p>Sign in with your workspace account</p>
      </div>

      <div class="alert alert-error" id="loginAlert"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Work Email</label>
          <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-password-wrap">
            <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
            <button type="button" class="toggle-password" data-target="password" aria-label="Show password">
              <svg class="icon-eye" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="icon-eye-off" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <div class="form-row">
          <label class="checkbox-wrap">
            <input type="checkbox" name="remember" id="remember">
            <span>Remember me</span>
          </label>
          <a href="forgot_password.html" class="auth-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </div>

    </div>
  </div>

  <script src="static/js/auth.js"></script>
</body>
</html>
